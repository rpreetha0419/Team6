<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>EduNova — Student Marksheet Management</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Exo+2:wght@300;400;500;600&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --neon-blue: #00d4ff;
    --neon-purple: #b44bff;
    --neon-cyan: #00fff7;
    --neon-pink: #ff2d9f;
    --bg-dark: #020412;
    --bg-panel: rgba(6, 12, 35, 0.85);
    --bg-card: rgba(10, 20, 55, 0.7);
    --border-glow: rgba(0, 212, 255, 0.25);
    --text-primary: #e8f4ff;
    --text-secondary: #7a9cc0;
    --sidebar-w: 260px;
  }
  [data-theme="light"] {
    --bg-dark: #f0f4ff;
    --bg-panel: rgba(240, 245, 255, 0.9);
    --bg-card: rgba(255, 255, 255, 0.85);
    --border-glow: rgba(0, 100, 200, 0.2);
    --text-primary: #0a1628;
    --text-secondary: #4a6080;
    --neon-blue: #0066cc;
    --neon-purple: #7c22cc;
    --neon-cyan: #007acc;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Exo 2', sans-serif;
    background: var(--bg-dark);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
    transition: all 0.4s ease;
  }

  /* ───── ANIMATED BACKGROUND ───── */
  .bg-nebula {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse at 20% 30%, rgba(0,100,255,0.12) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 70%, rgba(140,0,255,0.10) 0%, transparent 55%),
                radial-gradient(ellipse at 50% 50%, rgba(0,255,247,0.04) 0%, transparent 70%),
                #020412;
    pointer-events: none;
  }
  [data-theme="light"] .bg-nebula {
    background: radial-gradient(ellipse at 20% 30%, rgba(0,100,255,0.06) 0%, transparent 55%),
                radial-gradient(ellipse at 80% 70%, rgba(140,0,255,0.05) 0%, transparent 55%),
                #f0f4ff;
  }
  .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .star { position: absolute; border-radius: 50%; animation: twinkle var(--d,3s) ease-in-out infinite alternate; }
  @keyframes twinkle { from { opacity: 0.1; transform: scale(1); } to { opacity: 0.8; transform: scale(1.4); } }
  [data-theme="light"] .stars { display: none; }

  /* ───── GLASSMORPHISM ───── */
  .glass {
    background: var(--bg-card);
    backdrop-filter: blur(18px) saturate(1.5);
    -webkit-backdrop-filter: blur(18px) saturate(1.5);
    border: 1px solid var(--border-glow);
    border-radius: 16px;
  }
  .glass-panel {
    background: var(--bg-panel);
    backdrop-filter: blur(24px);
    -webkit-backdrop-filter: blur(24px);
    border: 1px solid var(--border-glow);
  }

  /* ───── NEON BUTTONS ───── */
  .btn-neon {
    position: relative; display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 22px; border-radius: 10px; font-family: 'Exo 2', sans-serif;
    font-weight: 600; font-size: 14px; letter-spacing: 0.5px;
    cursor: pointer; border: none; transition: all 0.3s ease;
    overflow: hidden; text-decoration: none;
  }
  .btn-neon::before {
    content: ''; position: absolute; inset: 0; border-radius: 10px;
    opacity: 0; transition: opacity 0.3s;
  }
  .btn-neon::after {
    content: ''; position: absolute; inset: -2px; border-radius: 12px;
    z-index: -1; opacity: 0; transition: opacity 0.3s;
  }
  .btn-neon:hover { transform: scale(1.04); }
  .btn-neon:hover::before { opacity: 0.15; }
  .btn-neon:hover::after { opacity: 1; }
  .btn-neon:active { transform: scale(0.97); animation: pulse-click 0.3s; }
  @keyframes pulse-click {
    0% { box-shadow: 0 0 0 0 currentColor; }
    100% { box-shadow: 0 0 0 14px transparent; }
  }

  .btn-blue {
    background: linear-gradient(135deg, #0044ff 0%, #00aaff 100%);
    color: #fff;
    box-shadow: 0 0 18px rgba(0,150,255,0.45), inset 0 1px 0 rgba(255,255,255,0.2);
  }
  .btn-blue::before { background: white; }
  .btn-blue::after { background: linear-gradient(135deg,#0044ff,#00aaff); filter: blur(10px); }
  .btn-blue:hover { box-shadow: 0 0 32px rgba(0,180,255,0.7), 0 0 60px rgba(0,100,255,0.3), inset 0 1px 0 rgba(255,255,255,0.3); }

  .btn-purple {
    background: linear-gradient(135deg, #7c00ff 0%, #cc44ff 100%);
    color: #fff;
    box-shadow: 0 0 18px rgba(160,0,255,0.45), inset 0 1px 0 rgba(255,255,255,0.2);
  }
  .btn-purple:hover { box-shadow: 0 0 32px rgba(180,75,255,0.7), 0 0 60px rgba(120,0,255,0.3), inset 0 1px 0 rgba(255,255,255,0.3); }

  .btn-cyan {
    background: linear-gradient(135deg, #006688 0%, #00d4ff 100%);
    color: #fff;
    box-shadow: 0 0 18px rgba(0,200,255,0.45), inset 0 1px 0 rgba(255,255,255,0.2);
  }
  .btn-cyan:hover { box-shadow: 0 0 32px rgba(0,220,255,0.7), 0 0 60px rgba(0,180,255,0.3); }

  .btn-ghost {
    background: transparent;
    color: var(--neon-blue);
    border: 1px solid var(--neon-blue);
    box-shadow: 0 0 10px rgba(0,180,255,0.2), inset 0 0 10px rgba(0,180,255,0.05);
  }
  .btn-ghost:hover { background: rgba(0,180,255,0.1); box-shadow: 0 0 24px rgba(0,180,255,0.5); }

  .btn-danger {
    background: linear-gradient(135deg, #cc0033 0%, #ff4466 100%);
    color: #fff;
    box-shadow: 0 0 18px rgba(255,50,80,0.4);
  }
  .btn-danger:hover { box-shadow: 0 0 32px rgba(255,50,80,0.7); }

  .btn-sm { padding: 6px 14px; font-size: 12px; }
  .btn-icon { padding: 8px; border-radius: 8px; }

  /* ───── RIPPLE ───── */
  .ripple { position: absolute; border-radius: 50%; transform: scale(0); animation: ripple-anim 0.5s linear; background: rgba(255,255,255,0.3); }
  @keyframes ripple-anim { to { transform: scale(4); opacity: 0; } }

  /* ───── SIDEBAR ───── */
  #sidebar {
    position: fixed; left: 0; top: 0; bottom: 0; width: var(--sidebar-w);
    z-index: 100; display: flex; flex-direction: column;
    background: var(--bg-panel); backdrop-filter: blur(30px);
    border-right: 1px solid var(--border-glow);
    transition: transform 0.35s cubic-bezier(.4,0,.2,1);
  }
  .sidebar-logo {
    padding: 28px 24px 20px;
    font-family: 'Orbitron', monospace;
    font-size: 22px; font-weight: 900;
    background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 2px;
  }
  .sidebar-logo span { display: block; font-size: 10px; font-weight: 400; letter-spacing: 4px; opacity: 0.6; margin-top: 2px; font-family: 'JetBrains Mono', monospace; -webkit-text-fill-color: var(--text-secondary); }
  .nav-section { padding: 8px 16px; font-size: 10px; letter-spacing: 2px; color: var(--text-secondary); text-transform: uppercase; margin-top: 12px; }
  .nav-item {
    display: flex; align-items: center; gap: 12px;
    padding: 11px 20px; margin: 2px 12px; border-radius: 10px;
    cursor: pointer; transition: all 0.25s ease; color: var(--text-secondary);
    font-size: 14px; font-weight: 500; position: relative;
  }
  .nav-item:hover { background: rgba(0,180,255,0.08); color: var(--text-primary); }
  .nav-item.active {
    background: linear-gradient(135deg, rgba(0,80,255,0.2), rgba(0,200,255,0.1));
    color: var(--neon-blue);
    box-shadow: inset 0 0 20px rgba(0,180,255,0.07), 0 0 0 1px rgba(0,180,255,0.15);
  }
  .nav-item.active::before {
    content: ''; position: absolute; left: 0; top: 50%; transform: translateY(-50%);
    width: 3px; height: 60%; border-radius: 0 3px 3px 0;
    background: linear-gradient(to bottom, var(--neon-blue), var(--neon-purple));
    box-shadow: 0 0 8px var(--neon-blue);
  }
  .nav-icon { font-size: 18px; width: 22px; text-align: center; }
  .nav-badge { margin-left: auto; background: var(--neon-purple); color: #fff; font-size: 10px; padding: 1px 7px; border-radius: 20px; font-weight: 700; box-shadow: 0 0 8px rgba(180,75,255,0.6); }
  .sidebar-footer { margin-top: auto; padding: 20px; border-top: 1px solid var(--border-glow); }
  .user-card { display: flex; align-items: center; gap: 12px; }
  .avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 15px; flex-shrink: 0; }
  .avatar-admin { background: linear-gradient(135deg, #0044ff, #00d4ff); box-shadow: 0 0 12px rgba(0,180,255,0.4); }
  .avatar-student { background: linear-gradient(135deg, #7c00ff, #cc44ff); box-shadow: 0 0 12px rgba(160,75,255,0.4); }
  .avatar-parent { background: linear-gradient(135deg, #cc6600, #ffaa00); box-shadow: 0 0 12px rgba(255,160,0,0.4); }
  .user-name { font-size: 13px; font-weight: 600; }
  .user-role { font-size: 11px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; }

  /* ───── MAIN CONTENT ───── */
  #main { margin-left: var(--sidebar-w); min-height: 100vh; position: relative; z-index: 1; }
  .topbar {
    position: sticky; top: 0; z-index: 50; display: flex; align-items: center;
    justify-content: space-between; padding: 16px 32px;
    background: var(--bg-panel); backdrop-filter: blur(24px);
    border-bottom: 1px solid var(--border-glow);
  }
  .page-title { font-family: 'Orbitron', monospace; font-size: 18px; font-weight: 700; letter-spacing: 1px; }
  .topbar-actions { display: flex; align-items: center; gap: 12px; }
  .content-area { padding: 28px 32px; }

  /* ───── STAT CARDS ───── */
  .stat-card {
    position: relative; overflow: hidden;
    border-radius: 16px; padding: 22px 24px;
    transition: transform 0.3s, box-shadow 0.3s;
  }
  .stat-card:hover { transform: translateY(-4px); }
  .stat-card::after { content: ''; position: absolute; bottom: -20px; right: -20px; width: 100px; height: 100px; border-radius: 50%; opacity: 0.12; }
  .sc-blue { background: linear-gradient(135deg, rgba(0,60,180,0.4), rgba(0,150,255,0.2)); border: 1px solid rgba(0,180,255,0.25); box-shadow: 0 4px 24px rgba(0,120,255,0.15); }
  .sc-blue::after { background: var(--neon-blue); }
  .sc-purple { background: linear-gradient(135deg, rgba(80,0,180,0.4), rgba(160,0,255,0.2)); border: 1px solid rgba(160,75,255,0.25); box-shadow: 0 4px 24px rgba(120,0,255,0.15); }
  .sc-purple::after { background: var(--neon-purple); }
  .sc-cyan { background: linear-gradient(135deg, rgba(0,80,100,0.4), rgba(0,200,255,0.2)); border: 1px solid rgba(0,200,255,0.25); box-shadow: 0 4px 24px rgba(0,180,255,0.15); }
  .sc-cyan::after { background: var(--neon-cyan); }
  .sc-pink { background: linear-gradient(135deg, rgba(140,0,80,0.4), rgba(255,0,120,0.2)); border: 1px solid rgba(255,0,120,0.25); box-shadow: 0 4px 24px rgba(255,0,100,0.15); }
  .sc-pink::after { background: var(--neon-pink); }
  .stat-label { font-size: 12px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 8px; }
  .stat-value { font-family: 'Orbitron', monospace; font-size: 32px; font-weight: 700; line-height: 1; }
  .stat-sub { font-size: 12px; margin-top: 8px; color: var(--text-secondary); }
  .stat-icon { position: absolute; top: 20px; right: 20px; font-size: 28px; opacity: 0.6; }
  .stat-trend { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; margin-top: 6px; }
  .trend-up { color: #00e676; } .trend-dn { color: #ff5252; }

  /* ───── SECTION HEADERS ───── */
  .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 18px; }
  .section-title { font-family: 'Orbitron', monospace; font-size: 14px; font-weight: 700; letter-spacing: 1px; display: flex; align-items: center; gap: 8px; }
  .section-title::before { content: ''; width: 4px; height: 18px; border-radius: 2px; background: linear-gradient(to bottom, var(--neon-blue), var(--neon-purple)); box-shadow: 0 0 8px var(--neon-blue); }

  /* ───── TABLE ───── */
  .data-table { width: 100%; border-collapse: separate; border-spacing: 0; }
  .data-table thead th { padding: 12px 16px; text-align: left; font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-secondary); border-bottom: 1px solid var(--border-glow); }
  .data-table tbody tr { transition: background 0.2s; }
  .data-table tbody tr:hover { background: rgba(0,180,255,0.05); }
  .data-table tbody td { padding: 14px 16px; font-size: 14px; border-bottom: 1px solid rgba(255,255,255,0.04); }

  /* ───── GRADE BADGE ───── */
  .grade-badge { display: inline-flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 8px; font-weight: 700; font-size: 13px; font-family: 'Orbitron', monospace; }
  .grade-s { background: linear-gradient(135deg,#005500,#00cc44); box-shadow: 0 0 8px rgba(0,200,60,0.4); }
  .grade-a { background: linear-gradient(135deg,#003366,#0088ff); box-shadow: 0 0 8px rgba(0,140,255,0.4); }
  .grade-b { background: linear-gradient(135deg,#554400,#ccaa00); box-shadow: 0 0 8px rgba(200,160,0,0.4); }
  .grade-c { background: linear-gradient(135deg,#440000,#cc4400); box-shadow: 0 0 8px rgba(200,60,0,0.4); }

  /* ───── PROGRESS BAR ───── */
  .prog-bar { height: 6px; border-radius: 3px; background: rgba(255,255,255,0.08); overflow: hidden; }
  .prog-fill { height: 100%; border-radius: 3px; transition: width 1s cubic-bezier(.4,0,.2,1); }
  .prog-blue { background: linear-gradient(to right, #0044ff, #00d4ff); box-shadow: 0 0 8px rgba(0,180,255,0.5); }
  .prog-purple { background: linear-gradient(to right, #7c00ff, #cc44ff); box-shadow: 0 0 8px rgba(160,75,255,0.5); }
  .prog-green { background: linear-gradient(to right, #006622, #00e676); box-shadow: 0 0 8px rgba(0,220,100,0.5); }
  .prog-yellow { background: linear-gradient(to right, #aa6600, #ffcc00); box-shadow: 0 0 8px rgba(255,180,0,0.5); }

  /* ───── BADGE / ACHIEVEMENT ───── */
  .achievement { text-align: center; padding: 16px 12px; transition: transform 0.3s; }
  .achievement:hover { transform: translateY(-4px); }
  .badge-icon { font-size: 36px; display: block; margin-bottom: 8px; filter: drop-shadow(0 0 8px gold); }
  .badge-name { font-size: 12px; font-weight: 600; letter-spacing: 0.5px; }
  .badge-desc { font-size: 11px; color: var(--text-secondary); margin-top: 3px; }

  /* ───── NOTIFICATION ───── */
  .notif-item { display: flex; gap: 12px; padding: 14px 0; border-bottom: 1px solid var(--border-glow); }
  .notif-item:last-child { border-bottom: none; }
  .notif-dot { width: 8px; height: 8px; border-radius: 50%; margin-top: 5px; flex-shrink: 0; box-shadow: 0 0 6px currentColor; }
  .notif-blue { background: var(--neon-blue); color: var(--neon-blue); }
  .notif-purple { background: var(--neon-purple); color: var(--neon-purple); }
  .notif-green { background: #00e676; color: #00e676; }
  .notif-title { font-size: 13px; font-weight: 600; }
  .notif-time { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

  /* ───── LOGIN PAGE ───── */
  #login-page {
    position: fixed; inset: 0; z-index: 200;
    display: flex; align-items: center; justify-content: center;
    background: url('https://images.unsplash.com/photo-1523050854058-8df90110c9f1?w=1600&q=80') center/cover no-repeat;
  }
  .login-overlay { position: absolute; inset: 0; background: linear-gradient(135deg, rgba(2,4,18,0.88) 0%, rgba(20,0,60,0.82) 50%, rgba(0,20,60,0.88) 100%); backdrop-filter: blur(6px); }
  .login-card {
    position: relative; z-index: 2;
    width: 420px; padding: 40px;
    background: rgba(6,12,40,0.75);
    backdrop-filter: blur(30px) saturate(1.8);
    border: 1px solid rgba(0,180,255,0.3);
    border-radius: 24px;
    box-shadow: 0 0 60px rgba(0,100,255,0.15), 0 0 120px rgba(80,0,255,0.1), inset 0 1px 0 rgba(255,255,255,0.08);
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
  .login-title { font-family: 'Orbitron', monospace; font-size: 26px; font-weight: 900; letter-spacing: 2px; text-align: center; margin-bottom: 4px; background: linear-gradient(135deg, var(--neon-blue), var(--neon-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .login-sub { text-align: center; font-size: 12px; letter-spacing: 3px; color: rgba(100,160,220,0.7); text-transform: uppercase; margin-bottom: 28px; font-family: 'JetBrains Mono', monospace; }
  .input-wrap { position: relative; margin-bottom: 16px; }
  .input-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: rgba(100,160,220,0.7); margin-bottom: 6px; display: block; font-family: 'JetBrains Mono', monospace; }
  .neon-input {
    width: 100%; padding: 12px 16px; border-radius: 10px; font-size: 14px;
    background: rgba(0,20,60,0.6); color: #e8f4ff;
    border: 1px solid rgba(0,180,255,0.2);
    outline: none; transition: all 0.3s; font-family: 'Exo 2', sans-serif;
  }
  .neon-input:focus {
    border-color: var(--neon-blue);
    box-shadow: 0 0 20px rgba(0,180,255,0.25), inset 0 0 15px rgba(0,180,255,0.05);
  }
  .neon-input::placeholder { color: rgba(100,160,220,0.4); }
  .role-tabs { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 20px; }
  .role-tab { padding: 10px 8px; text-align: center; border-radius: 10px; cursor: pointer; font-size: 12px; font-weight: 600; letter-spacing: 0.5px; border: 1px solid rgba(100,180,255,0.15); background: rgba(0,20,60,0.4); color: rgba(100,160,220,0.7); transition: all 0.3s; }
  .role-tab:hover { border-color: rgba(0,180,255,0.3); color: var(--neon-blue); }
  .role-tab.active { background: linear-gradient(135deg, rgba(0,60,200,0.4), rgba(0,180,255,0.2)); border-color: var(--neon-blue); color: var(--neon-blue); box-shadow: 0 0 16px rgba(0,180,255,0.2); }
  .login-error { color: #ff6680; font-size: 12px; text-align: center; margin-bottom: 10px; min-height: 16px; }

  /* ───── AI INSIGHT CARD ───── */
  .ai-card { padding: 16px; border-radius: 12px; margin-bottom: 10px; position: relative; overflow: hidden; }
  .ai-card::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; }
  .ai-weak { background: rgba(255,50,80,0.08); border: 1px solid rgba(255,50,80,0.2); }
  .ai-weak::before { background: linear-gradient(to bottom, #ff3350, #ff8850); }
  .ai-tip { background: rgba(0,200,100,0.08); border: 1px solid rgba(0,200,100,0.2); }
  .ai-tip::before { background: linear-gradient(to bottom, #00e676, #00c8ff); }
  .ai-pred { background: rgba(160,75,255,0.08); border: 1px solid rgba(160,75,255,0.2); }
  .ai-pred::before { background: linear-gradient(to bottom, var(--neon-purple), var(--neon-blue)); }
  .ai-label { font-size: 10px; letter-spacing: 2px; text-transform: uppercase; font-family: 'JetBrains Mono', monospace; opacity: 0.6; margin-bottom: 4px; }
  .ai-text { font-size: 13px; line-height: 1.5; }

  /* ───── GOAL TRACK ───── */
  .goal-item { padding: 16px 0; border-bottom: 1px solid var(--border-glow); }
  .goal-item:last-child { border-bottom: none; }
  .goal-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .goal-name { font-size: 13px; font-weight: 600; }
  .goal-pct { font-family: 'Orbitron', monospace; font-size: 13px; }
  .goal-deadline { font-size: 11px; color: var(--text-secondary); margin-top: 2px; }

  /* ───── MODAL ───── */
  .modal-backdrop { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 150; backdrop-filter: blur(4px); display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
  .modal-backdrop.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--bg-panel); border: 1px solid var(--border-glow); border-radius: 20px; padding: 28px; width: 500px; max-width: 95vw; max-height: 90vh; overflow-y: auto; transform: translateY(20px); transition: transform 0.3s; box-shadow: 0 0 60px rgba(0,100,255,0.2); }
  .modal-backdrop.open .modal { transform: translateY(0); }
  .modal-title { font-family: 'Orbitron', monospace; font-size: 16px; font-weight: 700; margin-bottom: 20px; }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--text-secondary); margin-bottom: 6px; display: block; }

    document.getElementById('login-err').textContent = `⚠ This account is not a ${selectedRole}.`;
    setTimeout(()=>document.getElementById('login-err').textContent='',2500);
    return;
  }
  state.user = { ...user, username: u };
  state.role = user.role;
  state.selectedStudent = user.studentId || (user.childId) || null;
  document.getElementById('login-page').style.display='none';
  document.getElementById('app').style.display='block';
  buildNav(); renderUserCard(); navigateTo('dashboard');
  showToast('success','✅ Welcome back, '+user.name+'!');
}

function doLogout() {
  state.user=null; state.role=null;
  document.getElementById('app').style.display='none';
  document.getElementById('login-page').style.display='flex';
  document.getElementById('login-user').value='preetha';
  document.getElementById('login-pass').value='admin123';
  selectedRole='admin';
  document.querySelectorAll('.role-tab').forEach((t,i)=>t.classList.toggle('active',i===0));
}

function getNavItems() {
  const all = [
    {id:'dashboard', icon:'📊', label:'dashboard'},
    {id:'students',  icon:'🎓', label:'students',   roles:['admin']},
    {id:'marks',     icon:'📝', label:'marks',      roles:['admin']},
    {id:'analytics', icon:'📈', label:'analytics'},
    {id:'marksheet', icon:'📄', label:'marksheet',  roles:['student','parent','admin']},
    {id:'goals',     icon:'🎯', label:'goals',      roles:['student','admin']},
    {id:'badges',    icon:'🏆', label:'badges',     roles:['student']},
    {id:'aiInsights',icon:'🤖', label:'aiInsights', roles:['student','admin']},
    {id:'career',    icon:'🚀', label:'career',     roles:['student']},
  ];
  return all.filter(n => !n.roles || n.roles.includes(state.role));
}

function buildNav() {
  const items = getNavItems();
  document.getElementById('nav-container').innerHTML = `
    <div class="nav-section">Navigation</div>
    ${items.map(n=>`
      <div class="nav-item${n.id===state.currentPage?' active':''}" onclick="navigateTo('${n.id}')" id="nav-${n.id}">
        <span class="nav-icon">${n.icon}</span>
        <span>${t(n.label)}</span>
        ${n.id==='notifications'?'<span class="nav-badge">3</span>':''}
      </div>
    `).join('')}
  `;
}

function renderUserCard() {
  const u=state.user;
  const cls = {admin:'avatar-admin',student:'avatar-student',parent:'avatar-parent'};
  document.getElementById('sb-avatar').className=`avatar ${cls[state.role]}`;
  document.getElementById('sb-avatar').textContent=u.name[0];
  document.getElementById('sb-name').textContent=u.name;
  document.getElementById('sb-role').textContent=state.role.toUpperCase();
}

function navigateTo(page) {
  state.currentPage=page;
  document.getElementById('page-title').textContent=t(page);
  // Destroy existing charts
  Object.values(state.chartInstances).forEach(c=>{ try{c.destroy()}catch(e){} });
  state.chartInstances={};
  buildNav();
  const pages = {
    dashboard: pageDashboard, students: pageStudents, marks: pageMarks,
    analytics: pageAnalytics, marksheet: pageMarksheet, goals: pageGoals,
    badges: pageBadges, aiInsights: pageAI, career: pageCareer,
  };
  const fn = pages[page] || pageDashboard;
  document.getElementById('page-content').innerHTML = '<div class="fade-in">'+fn()+'</div>';
  setTimeout(initCharts, 50);
  addRippleToButtons();
  if(window.innerWidth<=768) document.getElementById('sidebar').classList.remove('open');
}

function mkChart(id, type, data, options={}) {
  const el = document.getElementById(id);
  if(!el) return;
  const c = new Chart(el, {
    type, data,
    options: {
      responsive: true, maintainAspectRatio: true,
      animation: { duration: 800, easing: 'easeInOutQuart' },
      plugins: {
        ...CHART_DEFAULTS.plugins,
        tooltip: { backgroundColor: 'rgba(6,12,40,0.95)', titleColor: '#e8f4ff', bodyColor: '#7a9cc0', borderColor: 'rgba(0,180,255,0.2)', borderWidth: 1 },
        ...options.plugins
      },
      scales: options.scales || {
        x: { ticks: { color: CHART_DEFAULTS.color }, grid: { color: CHART_DEFAULTS.grid } },
        y: { ticks: { color: CHART_DEFAULTS.color }, grid: { color: CHART_DEFAULTS.grid } }

}

function getStudentAvg(sid, sem) {
  const m = DB.marks[sid]?.[sem]; if(!m) return 0;
  const vals = Object.values(m);
  return Math.round(vals.reduce((a,b)=>a+b,0)/vals.length);
}
function getClassAverage() {
  const avgs = DB.students.map(s=>getStudentAvg(s.id,'Semester 2'));
  return Math.round(avgs.reduce((a,b)=>a+b,0)/avgs.length);
}
function getTopPerformer() {
  return DB.students.map(s=>({name:s.name,avg:getStudentAvg(s.id,'Semester 2')})).sort((a,b)=>b.avg-a.avg)[0];
}
function gradeLabel(score) {
  if(score>=90) return 'S'; if(score>=75) return 'A'; if(score>=60) return 'B'; return 'C';
}
function getStudyTip(subject, score) {
  const tips = {
    Mathematics:`Practice daily problem sets focusing on calculus and algebra. Use Khan Academy for structured learning. Score gap: ${75-score} marks.`,
    Physics:`Revise fundamental concepts with NCERT. Solve previous year questions. Focus on numerical problems. Score gap: ${75-score} marks.`,
    Chemistry:`Create flashcards for organic reactions. Focus on periodic table trends. Score gap: ${75-score} marks.`,
    Biology:`Draw and label diagrams. Use mnemonics for taxonomy. Read NCERT thoroughly. Score gap: ${75-score} marks.`,
    English:`Read editorial articles daily. Practice essay writing. Score gap: ${75-score} marks.`,
    Tamil:`Read classic Tamil literature. Practice grammar exercises. Score gap: ${75-score} marks.`,
    default:`Dedicate 2 extra hours daily to this subject. Seek teacher guidance. Score gap: ${75-score} marks.`
  };
  const tip = tips[subject] || tips.default;
  return `<div class="ai-card ai-tip"><div class="ai-label">Study Tip — ${subject}</div><div class="ai-text">${tip}</div></div>`;
}
function getStudyPlan(sid) {
  return [
    {icon:'📅',title:'Daily Practice (1.5 hrs)',desc:'Solve 20 problems in Mathematics and 10 Physics numericals every morning.'},
    {icon:'📖',title:'Concept Review (1 hr)',desc:'Use NCERT and reference books. Cover weak subjects first.'},
    {icon:'✍️',title:'Weekly Mock Tests',desc:'Attempt full-length mock tests every Sunday. Analyze errors.'},
    {icon:'🎯',title:'Goal Check-ins',desc:'Review goal completion every Friday. Adjust study hours accordingly.'},
    {icon:'🤝',title:'Peer Study Groups',desc:'Join 2-hr study groups on Wednesdays for collaborative learning.'},
  ];
}
function getCareerPaths(marks) {
  const m = (s) => marks[s.replace(/\s/g,'')] || 0;
  return [
    {icon:'💻',title:'Software Engineering',desc:'Build scalable systems and applications. High demand globally.',color:'#00d4ff',match:Math.min(100,Math.round((m('Computer Science')+m('Mathematics'))/2)),skills:['Python','Algorithms','DSA','Cloud']},
    {icon:'🔬',title:'Research Scientist',desc:'Pursue academic research in sciences and publish discoveries.',color:'#b44bff',match:Math.min(100,Math.round((m('Physics')+m('Chemistry')+m('Biology'))/3)),skills:['Research','Lab Skills','Statistics','Writing']},
    {icon:'🏥',title:'Medicine / MBBS',desc:'Diagnose and treat patients. Noble and high-impact career.',color:'#00e676',match:Math.min(100,Math.round((m('Biology')+m('Chemistry'))/2)),skills:['Biology','Chemistry','Empathy','NEET']},
    {icon:'🏗️',title:'Engineering (Core)',desc:'Design infrastructure, circuits, and mechanical systems.',color:'#ffcc00',match:Math.min(100,Math.round((m('Mathematics')+m('Physics'))/2)),skills:['Maths','Physics','CAD','Problem Solving']},
    {icon:'📊',title:'Data Science / AI',desc:'Analyze data to drive decisions. The future of every industry.',color:'#ff6b6b',match:Math.min(100,Math.round((m('Mathematics')+m('Computer Science'))/2)),skills:['Statistics','Python','ML','Visualization']},
    {icon:'✍️',title:'Literature & Journalism',desc:'Write, report, and shape public discourse through language.',color:'#ff9f43',match:Math.min(100,Math.round((m('English')+m('Tamil'))/2)),skills:['Writing','Research','Languages','Critical Thinking']},

function showToast(type, msg) {
  const c = document.getElementById('toast-container');
  const icons = {success:'✅',error:'❌',info:'ℹ️',warning:'⚠️'};
  const t = document.createElement('div');
  t.className = `toast toast-${type==='error'?'error':type==='info'?'info':'success'}`;
  t.innerHTML = `<span>${icons[type]||'📢'}</span><span>${msg}</span>`;
  c.appendChild(t);
  setTimeout(()=>t.remove(), 3100);
}

function addRippleToButtons() {
  document.querySelectorAll('.btn-neon').forEach(btn=>{
    if(btn.dataset.rippled) return; btn.dataset.rippled='1';
    btn.addEventListener('click',function(e){
      const r=document.createElement('span'); r.className='ripple';
      const rect=this.getBoundingClientRect();
      const size=Math.max(rect.width,rect.height);
      r.style.cssText=`width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
      this.appendChild(r); setTimeout(()=>r.remove(),600);
    });
  });
}

function toggleTheme() {
  const html=document.documentElement;
  state.theme = html.dataset.theme==='dark'?'light':'dark';
  html.dataset.theme = state.theme;
}

function toggleLang() {
  state.lang = state.lang==='en'?'ta':'en';
  document.getElementById('lang-btn').textContent = state.lang==='en'?'தமிழ்':'English';
  buildNav();
  document.getElementById('page-title').textContent = t(state.currentPage);
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// Close modals on backdrop click
document.querySelectorAll('.modal-backdrop').forEach(bd=>{
  bd.addEventListener('click',e=>{ if(e.target===bd) bd.classList.remove('open'); });
});

// Demo login on Enter
document.addEventListener('keydown',e=>{ if(e.key==='Enter'&&document.getElementById('login-page').style.display!=='none') doLogin(); });
</script>
