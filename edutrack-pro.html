<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>🎓 EduTrack Pro — Smart Marksheet System</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --green:#00f5a0;--blue:#38bdf8;--yellow:#fbbf24;--orange:#fb923c;
  --red:#f87171;--purple:#a78bfa;--pink:#f472b6;
  --bg:#060b13;--card:#0d1626;--card2:#111927;--border:#1e293b;
  --text:#e2e8f0;--muted:#475569;--muted2:#334155;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;z-index:0;
  background-image:linear-gradient(rgba(0,245,160,0.025) 1px,transparent 1px),linear-gradient(90deg,rgba(0,245,160,0.025) 1px,transparent 1px);
  background-size:44px 44px;pointer-events:none;}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* ===================== LOGIN ===================== */
#loginScreen{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 60% 40%,rgba(0,245,160,0.06) 0%,transparent 60%),var(--bg);}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:40px 36px;width:100%;max-width:400px;
  box-shadow:0 0 60px rgba(0,0,0,0.6);animation:fadeUp .5s ease;}
.login-logo{text-align:center;margin-bottom:28px;}
.login-logo h1{font-family:'Share Tech Mono',monospace;font-size:22px;color:var(--green);text-shadow:0 0 20px rgba(0,245,160,0.4);letter-spacing:3px;}
.login-logo p{color:var(--muted);font-size:11px;letter-spacing:3px;margin-top:4px;}
.role-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:24px;}
.role-tab{padding:10px 6px;border:1px solid var(--border);border-radius:8px;background:transparent;
  color:var(--muted);cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:1px;
  text-align:center;transition:all .2s;}
.role-tab.active{border-color:var(--green);background:rgba(0,245,160,0.08);color:var(--green);}
.role-tab:hover:not(.active){border-color:var(--muted2);color:var(--text);}
.l-label{font-size:11px;color:var(--muted);letter-spacing:2px;font-family:'Share Tech Mono',monospace;margin-bottom:6px;display:block;}
.l-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:11px 14px;
  color:var(--text);font-family:'Rajdhani',sans-serif;font-size:15px;outline:none;margin-bottom:14px;transition:border-color .2s;}
.l-input:focus{border-color:var(--green);box-shadow:0 0 10px rgba(0,245,160,0.1);}
.l-btn{width:100%;background:rgba(0,245,160,0.1);border:1px solid var(--green);border-radius:8px;
  color:var(--green);padding:13px;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:13px;
  letter-spacing:2px;box-shadow:0 0 20px rgba(0,245,160,0.1);transition:all .2s;margin-top:6px;}
.l-btn:hover{background:rgba(0,245,160,0.18);box-shadow:0 0 30px rgba(0,245,160,0.2);}
.l-hint{text-align:center;font-size:12px;color:var(--muted2);margin-top:14px;font-family:'Share Tech Mono',monospace;}

/* ===================== APP ===================== */
#appScreen{display:none;position:relative;z-index:1;}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:14px 24px;
  display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar-left{display:flex;align-items:center;gap:14px;}
.topbar h1{font-family:'Share Tech Mono',monospace;font-size:18px;color:var(--green);letter-spacing:2px;}
.role-badge{padding:4px 12px;border-radius:20px;font-size:11px;letter-spacing:2px;font-family:'Share Tech Mono',monospace;font-weight:700;}
.topbar-right{display:flex;align-items:center;gap:10px;}
.user-info{text-align:right;}
.user-name{font-size:14px;font-weight:700;}
.user-role{font-size:11px;color:var(--muted);letter-spacing:1px;}
.logout-btn{background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);
  padding:7px 14px;cursor:pointer;font-family:'Share Tech Mono',monospace;font-size:11px;transition:all .2s;}
.logout-btn:hover{border-color:var(--red);color:var(--red);}

.layout{display:flex;min-height:calc(100vh - 57px);}
.sidebar{width:200px;flex-shrink:0;background:var(--card);border-right:1px solid var(--border);padding:16px 12px;}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:11px 14px;border-radius:8px;
  cursor:pointer;margin-bottom:4px;font-size:14px;font-weight:600;color:var(--muted);transition:all .2s;border:1px solid transparent;}
.sidebar-item:hover{color:var(--text);background:var(--card2);}
.sidebar-item.active{color:var(--green);background:rgba(0,245,160,0.06);border-color:rgba(0,245,160,0.15);}
.sidebar-item .icon{font-size:16px;width:20px;text-align:center;}
.sidebar-divider{height:1px;background:var(--border);margin:12px 0;}

.content{flex:1;padding:24px;overflow-y:auto;max-height:calc(100vh - 57px);}

/* ===================== STATS ===================== */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;
  transition:border-color .2s;animation:fadeUp .4s ease both;}
.stat-card:hover{border-color:var(--green);}
.stat-icon{font-size:24px;margin-bottom:10px;}
.stat-val{font-size:26px;font-weight:700;font-family:'Share Tech Mono',monospace;margin-bottom:4px;}
.stat-label{font-size:11px;color:var(--muted);letter-spacing:1px;}

/* ===================== SECTION TITLE ===================== */
.section-title{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--green);letter-spacing:2px;margin-bottom:16px;
  display:flex;align-items:center;gap:10px;}
.section-title::after{content:'';flex:1;height:1px;background:var(--border);}

/* ===================== TABLES ===================== */
.tbl-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px;}
.tbl-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.tbl-title{font-weight:700;font-size:15px;}
table{width:100%;border-collapse:collapse;}
th{background:var(--card2);padding:11px 16px;text-align:left;font-size:11px;color:var(--muted);
  letter-spacing:2px;font-family:'Share Tech Mono',monospace;border-bottom:1px solid var(--border);}
td{padding:13px 16px;border-bottom:1px solid rgba(30,41,59,0.5);font-size:14px;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:rgba(255,255,255,0.02);}
.grade-pill{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;
  font-family:'Share Tech Mono',monospace;display:inline-block;}
.action-btn{padding:5px 12px;border-radius:6px;font-size:12px;cursor:pointer;
  font-family:'Share Tech Mono',monospace;border:1px solid;transition:all .2s;margin-right:4px;}

/* ===================== FORMS ===================== */
.form-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:26px;margin-bottom:20px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-group{display:flex;flex-direction:column;gap:6px;}
.form-group.full{grid-column:span 2;}
.f-label{font-size:11px;color:var(--muted);letter-spacing:2px;font-family:'Share Tech Mono',monospace;}
.f-input,.f-select,.f-textarea{background:var(--bg);border:1px solid var(--border);border-radius:8px;
  padding:10px 14px;color:var(--text);font-family:'Rajdhani',sans-serif;font-size:14px;outline:none;transition:border-color .2s;width:100%;}
.f-input:focus,.f-select:focus,.f-textarea:focus{border-color:var(--green);box-shadow:0 0 8px rgba(0,245,160,0.1);}
.f-textarea{resize:vertical;min-height:90px;}
.btn-primary{background:rgba(0,245,160,0.1);border:1px solid var(--green);border-radius:8px;
  color:var(--green);padding:11px 24px;cursor:pointer;font-family:'Share Tech Mono',monospace;
  font-size:12px;letter-spacing:2px;transition:all .2s;}
.btn-primary:hover{background:rgba(0,245,160,0.18);}
.btn-secondary{background:rgba(56,189,248,0.08);border:1px solid var(--blue);border-radius:8px;
  color:var(--blue);padding:11px 24px;cursor:pointer;font-family:'Share Tech Mono',monospace;
  font-size:12px;letter-spacing:2px;transition:all .2s;}
.btn-secondary:hover{background:rgba(56,189,248,0.15);}
.btn-danger{background:rgba(248,113,113,0.08);border:1px solid var(--red);border-radius:8px;
  color:var(--red);padding:11px 24px;cursor:pointer;font-family:'Share Tech Mono',monospace;
  font-size:12px;letter-spacing:2px;transition:all .2s;}

/* ===================== MARK ROWS ===================== */
.mark-row{display:flex;gap:10px;align-items:center;margin-bottom:10px;}
.mark-subject{flex:1;}
.mark-score-in{width:90px;}
.add-row-btn{background:transparent;border:1px dashed var(--muted2);border-radius:8px;
  color:var(--muted);padding:10px;width:100%;cursor:pointer;font-family:'Rajdhani',sans-serif;
  font-size:14px;margin:8px 0 18px;transition:all .2s;}
.add-row-btn:hover{border-color:var(--blue);color:var(--blue);}
.rm-btn{background:transparent;border:1px solid var(--muted2);border-radius:6px;
  color:var(--muted);padding:8px 11px;cursor:pointer;font-size:12px;transition:all .2s;flex-shrink:0;}
.rm-btn:hover{border-color:var(--red);color:var(--red);}

/* ===================== PROGRESS ===================== */
.prog-bg{height:6px;background:var(--border);border-radius:3px;overflow:hidden;margin-top:4px;}
.prog-fill{height:100%;border-radius:3px;transition:width 1s cubic-bezier(.4,0,.2,1);}

/* ===================== FEEDBACK ===================== */
.feedback-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;margin-bottom:12px;}
.fb-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.fb-author{font-weight:700;font-size:15px;}
.fb-meta{font-size:11px;color:var(--muted);font-family:'Share Tech Mono',monospace;}
.fb-body{font-size:14px;color:#94a3b8;line-height:1.6;}
.stars{color:var(--yellow);font-size:16px;margin-bottom:6px;}
.star-btn{background:none;border:none;font-size:24px;cursor:pointer;padding:4px;transition:transform .2s;color:var(--muted2);}
.star-btn.lit{color:var(--yellow);}
.star-btn:hover{transform:scale(1.2);}

/* ===================== PRINT MARKSHEET ===================== */
.print-preview{background:white;color:#1a1a2e;border-radius:12px;padding:40px;max-width:680px;margin:0 auto;
  box-shadow:0 0 40px rgba(0,0,0,0.5);font-family:'Rajdhani',sans-serif;}
.print-header{text-align:center;border-bottom:3px double #1a1a2e;padding-bottom:16px;margin-bottom:20px;}
.print-school{font-size:22px;font-weight:700;color:#1a1a2e;letter-spacing:2px;}
.print-subtitle{font-size:13px;color:#555;margin-top:4px;letter-spacing:1px;}
.print-badge{display:inline-block;background:#1a1a2e;color:white;padding:4px 16px;border-radius:20px;font-size:12px;margin-top:8px;}
.print-info{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;background:#f8fafc;padding:14px;border-radius:8px;}
.pi-item{font-size:13px;}.pi-label{color:#888;font-size:11px;letter-spacing:1px;}
.print-table{width:100%;border-collapse:collapse;margin-bottom:20px;}
.print-table th{background:#1a1a2e;color:white;padding:10px 14px;text-align:left;font-size:12px;letter-spacing:1px;}
.print-table td{padding:10px 14px;border-bottom:1px solid #e2e8f0;font-size:14px;}
.print-table tr:nth-child(even) td{background:#f8fafc;}
.print-summary{display:flex;justify-content:space-around;background:#1a1a2e;color:white;padding:16px;border-radius:8px;margin-bottom:16px;}
.ps-item{text-align:center;}
.ps-val{font-size:22px;font-weight:700;}
.ps-label{font-size:10px;opacity:.7;letter-spacing:1px;}
.print-sign{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:24px;}
.sign-box{text-align:center;padding-top:40px;border-top:1px solid #ccc;font-size:12px;color:#555;letter-spacing:1px;}
.print-footer{text-align:center;font-size:11px;color:#aaa;margin-top:16px;border-top:1px solid #e2e8f0;padding-top:12px;}
.print-actions{display:flex;gap:12px;justify-content:center;margin-bottom:20px;}

/* ===================== TOAST ===================== */
.toast{position:fixed;top:22px;right:22px;z-index:9999;padding:13px 22px;border-radius:8px;
  font-size:13px;font-family:'Share Tech Mono',monospace;letter-spacing:1px;animation:slideIn .3s ease;pointer-events:none;}
.toast.success{background:#052e16;border:1px solid var(--green);color:var(--green);box-shadow:0 0 20px rgba(0,245,160,0.15);}
.toast.error{background:#450a0a;border:1px solid var(--red);color:var(--red);box-shadow:0 0 20px rgba(248,113,113,0.15);}
.toast.info{background:#0c1a2e;border:1px solid var(--blue);color:var(--blue);box-shadow:0 0 20px rgba(56,189,248,0.15);}

/* ===================== MODAL ===================== */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:28px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;animation:fadeUp .3s ease;}
.modal-title{font-family:'Share Tech Mono',monospace;color:var(--green);font-size:14px;letter-spacing:2px;margin-bottom:20px;}
.modal-close{float:right;background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer;margin-top:-4px;}

/* ===================== SEARCH BAR ===================== */
.search-bar{background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;
  color:var(--text);font-family:'Rajdhani',sans-serif;font-size:14px;outline:none;width:220px;transition:border-color .2s;}
.search-bar:focus{border-color:var(--blue);}

/* ANIMATIONS */
@keyframes fadeDown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}

/* PRINT CSS */
@media print{
  body>*:not(#printArea){display:none!important;}
  #printArea{display:block!important;position:fixed;inset:0;z-index:9999;}
  .print-actions,.print-preview-wrap button{display:none!important;}
}
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none;}
@media(max-width:700px){
  .sidebar{display:none;}
  .stats-grid{grid-template-columns:1fr 1fr;}
  .form-grid{grid-template-columns:1fr;}
  .form-group.full{grid-column:span 1;}
}
</style>
</head>
<body>

<!-- ============ LOGIN SCREEN ============ -->
<div id="loginScreen">
  <div class="login-box">
    <div class="login-logo">
      <h1>🎓 EDUTRACK PRO</h1>
      <p>SMART MARKSHEET SYSTEM</p>
    </div>
    <div class="role-tabs">
      <button class="role-tab active" onclick="selectRole('student')">🎒<br>STUDENT</button>
      <button class="role-tab" onclick="selectRole('staff')">📚<br>STAFF</button>
      <button class="role-tab" onclick="selectRole('parent')">👨‍👩‍👧<br>PARENT</button>
    </div>
    <label class="l-label">EMAIL / ID</label>
    <input class="l-input" id="loginEmail" placeholder="Enter your ID..."/>
    <label class="l-label">PASSWORD</label>
    <input class="l-input" id="loginPass" type="password" placeholder="Enter password..."/>
    <button class="l-btn" onclick="doLogin()">[ LOGIN ]</button>
    <p class="l-hint">Demo: student@demo / staff@demo / parent@demo<br>Password: 1234</p>
  </div>
</div>

<!-- ============ APP SCREEN ============ -->
<div id="appScreen">
  <div class="topbar">
    <div class="topbar-left">
      <h1>🎓 EDUTRACK PRO</h1>
      <span class="role-badge" id="roleBadge">STAFF</span>
    </div>
    <div class="topbar-right">
      <div class="user-info">
        <div class="user-name" id="userName">John Staff</div>
        <div class="user-role" id="userRoleLabel">CLASS TEACHER</div>
      </div>
      <button class="logout-btn" onclick="doLogout()">LOGOUT</button>
    </div>
  </div>
  <div class="layout">
    <div class="sidebar" id="sidebar"></div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- PRINT AREA (hidden) -->
<div id="printArea" style="display:none;"></div>

<script>
// ============================================================
//  DATA
// ============================================================
const SUBJECTS = ["Mathematics","Physics","Chemistry","English","Computer Science","Tamil","Biology","History","Economics"];

const USERS = {
  'student@demo': {password:'1234', role:'student', name:'Arun Kumar', id:'S001', class:'XII-A'},
  'staff@demo':   {password:'1234', role:'staff',   name:'Mr. Rajan',  id:'T001', subject:'Mathematics'},
  'parent@demo':  {password:'1234', role:'parent',  name:'Kumar Sr.',  id:'P001', childId:'S001'},
};

let students = [
  {id:'S001', name:'Arun Kumar',   class:'XII-A', parentId:'P001', marks:[{subject:'Mathematics',score:92,maxScore:100},{subject:'Physics',score:88,maxScore:100},{subject:'Tamil',score:95,maxScore:100},{subject:'English',score:79,maxScore:100}]},
  {id:'S002', name:'Priya Devi',   class:'XII-A', parentId:'P002', marks:[{subject:'Chemistry',score:78,maxScore:100},{subject:'English',score:85,maxScore:100},{subject:'Computer Science',score:91,maxScore:100}]},
  {id:'S003', name:'Karthik Raja', class:'XII-B', parentId:'P003', marks:[{subject:'Mathematics',score:65,maxScore:100},{subject:'Biology',score:72,maxScore:100},{subject:'English',score:58,maxScore:100}]},
  {id:'S004', name:'Meena Lakshmi',class:'XII-B', parentId:'P004', marks:[{subject:'Mathematics',score:45,maxScore:100},{subject:'Physics',score:52,maxScore:100},{subject:'Chemistry',score:60,maxScore:100}]},
  {id:'S005', name:'Vijay Anand',  class:'XII-A', parentId:'P005', marks:[{subject:'Mathematics',score:98,maxScore:100},{subject:'Physics',score:95,maxScore:100},{subject:'Computer Science',score:97,maxScore:100}]},
];

let feedbacks = [
  {id:1, fromRole:'parent', fromName:'Kumar Sr.', studentId:'S001', rating:5, message:'Very happy with my son Arun performance. The marksheet system is very clear and detailed. Great work!', date:'2024-04-10'},
  {id:2, fromRole:'student', fromName:'Priya Devi', studentId:'S002', rating:4, message:'The portal is very easy to use. I can see all my marks clearly.', date:'2024-04-12'},
  {id:3, fromRole:'staff', fromName:'Mr. Rajan', studentId:null, rating:5, message:'Excellent system for tracking student performance. Saves a lot of time.', date:'2024-04-14'},
];

let currentUser = null;
let currentPage = 'dashboard';
let addStudentForm = {name:'',cls:'XII-A',parentId:'',marks:[{subject:SUBJECTS[0],score:'',maxScore:100}]};
let newFeedbackRating = 5;
let searchQuery = '';
let printStudentId = null;

// ============================================================
//  HELPERS
// ============================================================
const gradeColor = s => s>=90?'#00f5a0':s>=75?'#38bdf8':s>=60?'#fbbf24':s>=35?'#fb923c':'#f87171';
const gradeLabel = s => s>=90?'S':s>=75?'A':s>=60?'B':s>=35?'C':'F';
const gradeColorBg = s => s>=90?'rgba(0,245,160,0.12)':s>=75?'rgba(56,189,248,0.12)':s>=60?'rgba(251,191,36,0.12)':s>=35?'rgba(251,146,60,0.12)':'rgba(248,113,113,0.12)';
const avg = m => m.length ? Math.round(m.reduce((a,b)=>a+b.score,0)/m.length) : 0;
const total = m => m.reduce((a,b)=>a+b.score,0);
const maxTotal = m => m.reduce((a,b)=>a+b.maxScore,0);
const pct = m => maxTotal(m)?Math.round((total(m)/maxTotal(m))*100):0;

function toast(msg,type='success'){
  const t=document.createElement('div');
  t.className=`toast ${type}`;t.textContent=msg;
  document.body.appendChild(t);setTimeout(()=>t.remove(),2800);
}

// ============================================================
//  LOGIN / LOGOUT
// ============================================================
let selectedRole='student';
function selectRole(r){
  selectedRole=r;
  document.querySelectorAll('.role-tab').forEach((el,i)=>{
    el.classList.toggle('active',['student','staff','parent'][i]===r);
  });
}

function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const pass=document.getElementById('loginPass').value.trim();
  const user=USERS[email];
  if(!user||user.password!==pass||user.role!==selectedRole){
    toast('Wrong credentials! Try demo accounts 👆','error');return;
  }
  currentUser={...user,email};
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').style.display='block';
  setupApp();
}

function doLogout(){
  currentUser=null;currentPage='dashboard';
  document.getElementById('loginScreen').style.display='flex';
  document.getElementById('appScreen').style.display='none';
  document.getElementById('loginEmail').value='';
  document.getElementById('loginPass').value='';
}

// ============================================================
//  SETUP
// ============================================================
function setupApp(){
  const roleColors={student:'#00f5a0',staff:'#38bdf8',parent:'#a78bfa'};
  const rb=document.getElementById('roleBadge');
  rb.textContent=currentUser.role.toUpperCase();
  rb.style.background=roleColors[currentUser.role]+'20';
  rb.style.color=roleColors[currentUser.role];
  rb.style.border=`1px solid ${roleColors[currentUser.role]}40`;

}

function navigate(page){currentPage=page;renderSidebar();renderContent();}

// ============================================================
//  CONTENT ROUTER
// ============================================================
function renderContent(){
  const role=currentUser.role;
  let html='';
  if(currentPage==='dashboard') html=buildDashboard();
  else if(currentPage==='students'&&role==='staff') html=buildStudentsList();
  else if(currentPage==='addStudent'&&role==='staff') html=buildAddStudent();
  else if(currentPage==='marks'&&role==='staff') html=buildMarksEntry();
  else if(currentPage==='mymarks'&&role==='student') html=buildMyMarks();
  else if(currentPage==='childmarks'&&role==='parent') html=buildChildMarks();
  else if(currentPage==='feedback') html=buildFeedback();
  else if(currentPage==='reports') html=buildReports();
  else html='<p style="color:var(--muted)">Page not found.</p>';
  document.getElementById('content').innerHTML=html;
  attachContentEvents();
  setTimeout(()=>{
    document.querySelectorAll('.prog-fill[data-w]').forEach(el=>{el.style.width=el.dataset.w+'%';});
  },100);
}

            </select>
            <input type="number" class="f-input mark-score" data-idx="${i}" style="width:100px" placeholder="Score" min="0" max="100" value="${m.score}"/>
            <input type="number" class="f-input mark-max" data-idx="${i}" style="width:80px" placeholder="Max" value="${m.maxScore}"/>
            ${i>0?`<button class="rm-btn" onclick="removeMarkRow(${i})">✕</button>`:''}
          </div>`).join('')}
      </div>
      <button class="add-row-btn" onclick="addMarkRow()">+ Add Another Subject</button>
    </div>
    <div style="display:flex;gap:12px">
      <button class="btn-primary" onclick="submitAddStudent()">[ ADD STUDENT ]</button>
      <button class="btn-danger" onclick="addStudentForm={name:'',cls:'XII-A',parentId:'',marks:[{subject:SUBJECTS[0],score:'',maxScore:100}]};renderContent()">Reset</button>
    </div>
  </div>`;
}

function addMarkRow(){addStudentForm.marks.push({subject:SUBJECTS[0],score:'',maxScore:100});renderContent();}
function removeMarkRow(i){addStudentForm.marks.splice(i,1);renderContent();}

function submitAddStudent(){
  const id=document.getElementById('addId').value.trim();
  const name=document.getElementById('addName').value.trim();
  const cls=document.getElementById('addClass').value;
  const parentId=document.getElementById('addParentId').value.trim();
  if(!id||!name){toast('ID & Name mandatory!','error');return;}
  if(students.find(s=>s.id===id)){toast('ID already exists!','error');return;}
  // collect marks from DOM
  const subEls=document.querySelectorAll('.mark-subject');
  const scEls=document.querySelectorAll('.mark-score');
  const mxEls=document.querySelectorAll('.mark-max');
  const marks=[];
  let valid=true;
  subEls.forEach((_,i)=>{
    const sc=Number(scEls[i].value),mx=Number(mxEls[i].value)||100;
    if(scEls[i].value===''||isNaN(sc)||sc<0||sc>mx){valid=false;return;}
    marks.push({subject:subEls[i].value,score:sc,maxScore:mx});
  });
  if(!valid||marks.length===0){toast('Check scores! (0 to max)','error');return;}
  students.push({id,name,class:cls,parentId,marks});
  addStudentForm={name:'',cls:'XII-A',parentId:'',marks:[{subject:SUBJECTS[0],score:'',maxScore:100}]};
  toast('Student added! 🎉');
  navigate('students');
}

function openEditMarks(sid){
  const s=students.find(x=>x.id===sid);

  const modal=document.createElement('div');
  modal.className='modal-bg';
  modal.id='editModal';
  modal.innerHTML=`
  <div class="modal">
    <div class="modal-title">✏️ EDIT MARKS — ${s.name} <button class="modal-close" onclick="document.getElementById('editModal').remove()">×</button></div>
    ${s.marks.map((m,i)=>`
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:10px">
        <select class="f-select em-subj" data-i="${i}" style="flex:1">${SUBJECTS.map(sub=>`<option ${m.subject===sub?'selected':''}>${sub}</option>`).join('')}</select>
        <input type="number" class="f-input em-score" data-i="${i}" style="width:90px" value="${m.score}" min="0" max="${m.maxScore}"/>

    </div>

function saveEditMarks(sid){
  const s=students.find(x=>x.id===sid);
  const subEls=document.querySelectorAll('.em-subj');

  subEls.forEach((_,i)=>{s.marks[i].subject=subEls[i].value;s.marks[i].score=Number(scEls[i].value);});

  toast('Marks saved! ✅');renderContent();
}

// ============================================================
//  FEEDBACK
// ============================================================
function buildFeedback(){
  const sid = currentUser.role==='student'?currentUser.id: currentUser.role==='parent'?currentUser.childId:null;
  return `
  <div class="section-title">FEEDBACK SYSTEM</div>

  <!-- Submit Feedback -->
  <div class="form-card" style="margin-bottom:24px">
    <div style="font-family:'Share Tech Mono',monospace;color:var(--purple);font-size:13px;letter-spacing:2px;margin-bottom:16px">[ SUBMIT FEEDBACK ]</div>
    ${currentUser.role==='staff'?`
      <div class="form-group" style="margin-bottom:14px">
        <label class="f-label">STUDENT (optional)</label>
        <select class="f-select" id="fbStudent">
          <option value="">General Feedback</option>
          ${students.map(s=>`<option value="${s.id}">${s.name}</option>`).join('')}
        </select>
      </div>`:''}
    <div class="form-group" style="margin-bottom:14px">
      <label class="f-label">RATING</label>
      <div id="starRow">
        ${[1,2,3,4,5].map(n=>`<button class="star-btn ${n<=newFeedbackRating?'lit':''}" onclick="setRating(${n})">${n<=newFeedbackRating?'★':'☆'}</button>`).join('')}
      </div>
    </div>
    <div class="form-group" style="margin-bottom:16px">
      <label class="f-label">MESSAGE</label>
      <textarea class="f-textarea" id="fbMsg" placeholder="Write your feedback here..."></textarea>
    </div>
    <button class="btn-primary" onclick="submitFeedback()">[ SUBMIT ]</button>
  </div>

  <!-- Feedback List -->
  <div class="section-title">ALL FEEDBACK</div>
  ${feedbacks.slice().reverse().map(fb=>`
    <div class="feedback-card" style="animation:fadeUp .4s ease">
      <div class="fb-header">
        <div>
          <div class="fb-author">${fb.fromName} <span style="font-size:11px;color:var(--muted);margin-left:6px;font-family:'Share Tech Mono',monospace">[${fb.fromRole.toUpperCase()}]</span></div>
          <div class="stars">${'★'.repeat(fb.rating)}${'☆'.repeat(5-fb.rating)}</div>
        </div>
        <div class="fb-meta">${fb.date}${fb.studentId?`<br>Re: ${students.find(s=>s.id===fb.studentId)?.name||fb.studentId}`:'<br>General'}</div>
      </div>
      <div class="fb-body">${fb.message}</div>
    </div>`).join('')}`;
}

function setRating(n){
  newFeedbackRating=n;
  document.querySelectorAll('.star-btn').forEach((btn,i)=>{
    btn.classList.toggle('lit',i<n);
    btn.textContent=i<n?'★':'☆';
  });
}

function submitFeedback(){
  const msg=document.getElementById('fbMsg').value.trim();
  if(!msg){toast('Message ஒண்ணு போடு bro!','error');return;}
  const sid=currentUser.role==='staff'?(document.getElementById('fbStudent')?.value||null):
             currentUser.role==='student'?currentUser.id:currentUser.childId;
  feedbacks.push({
    id:Date.now(),fromRole:currentUser.role,fromName:currentUser.name,
    studentId:sid||null,rating:newFeedbackRating,
    message:msg,date:new Date().toISOString().split('T')[0]
  });
  newFeedbackRating=5;toast('Feedback submitted! 💬');renderContent();
}

// ============================================================
//  REPORTS / MARKSHEET (Print/Download)
// ============================================================
function buildReports(){
  const role=currentUser.role;
  let sid=role==='student'?currentUser.id:role==='parent'?currentUser.childId:null;
  if(role==='staff'){
    return `
    <div class="section-title">REPORTS & DIGITAL MARKSHEET</div>
    <div class="tbl-wrap">
      <div class="tbl-header"><span class="tbl-title">Select student to generate marksheet</span></div>
      <table>
        <thead><tr><th>NAME</th><th>CLASS</th><th>%</th><th>GRADE</th><th>ACTION</th></tr></thead>
        <tbody>
          ${students.map(s=>{
            const p=pct(s.marks),c=gradeColor(p);
            return `<tr>
              <td><strong>${s.name}</strong></td><td>${s.class}</td>
              <td style="color:${c};font-weight:700">${p}%</td>
              <td><span class="grade-pill" style="background:${gradeColorBg(p)};color:${c};border:1px solid ${c}40">${gradeLabel(p)}</span></td>
              <td>
                <button class="action-btn" style="border-color:var(--green);color:var(--green)" onclick="openPrint('${s.id}')">🖨️ Print / Download</button>
              </td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>`;
  }
  const s=students.find(x=>x.id===sid);
  if(!s) return '<p style="color:var(--muted)">No data found.</p>';
  return `
  <div class="section-title">MY DIGITAL MARKSHEET</div>
  <div style="margin-bottom:16px;display:flex;gap:12px">
    <button class="btn-primary" onclick="openPrint('${s.id}')">🖨️ Print / Download PDF</button>
  </div>
  ${buildPrintHTML(s,true)}`;
}

function openPrint(sid){
  printStudentId=sid;
  const s=students.find(x=>x.id===sid);
  if(!s) return;
  const modal=document.createElement('div');
  modal.className='modal-bg';modal.id='printModal';
  modal.style.zIndex='600';
  modal.innerHTML=`
  <div class="modal" style="max-width:720px;background:#1a1f2e;border-color:#2d3748">
    <div class="modal-title">🖨️ PRINT / DOWNLOAD MARKSHEET
      <button class="modal-close" onclick="document.getElementById('printModal').remove()">×</button>
    </div>
    <div class="print-actions">
      <button class="btn-primary" onclick="doPrint('${sid}')">🖨️ Print</button>
      <button class="btn-secondary" onclick="doDownload('${sid}')">⬇️ Download HTML</button>
      <button class="btn-danger" onclick="document.getElementById('printModal').remove()">Close</button>
    </div>
    <div style="overflow-y:auto;max-height:65vh;padding:4px">
      ${buildPrintHTML(s,false)}
    </div>
  </div>`;
  document.body.appendChild(modal);
}

function buildPrintHTML(s,inline=false){
  const p=pct(s.marks),c=gradeColor(p),g=gradeLabel(p);
  const today=new Date().toLocaleDateString('en-IN',{year:'numeric',month:'long',day:'numeric'});
  return `
  <div class="print-preview" id="printContent_${s.id}">
    <div class="print-header">
      <div class="print-school">🎓 EDUTRACK PRO SCHOOL</div>
      <div class="print-subtitle">Affiliated to State Board of Education | Est. 2000</div>
      <div class="print-badge">OFFICIAL MARKSHEET</div>
    </div>
    <div class="print-info">
      <div><div class="pi-label">STUDENT NAME</div><div class="pi-item"><strong>${s.name}</strong></div></div>
      <div><div class="pi-label">STUDENT ID</div><div class="pi-item">${s.id}</div></div>
      <div><div class="pi-label">CLASS</div><div class="pi-item">${s.class}</div></div>
      <div><div class="pi-label">DATE OF ISSUE</div><div class="pi-item">${today}</div></div>
      <div><div class="pi-label">EXAM TYPE</div><div class="pi-item">Annual Examination 2024</div></div>
      <div><div class="pi-label">RESULT</div><div class="pi-item"><strong style="color:${p>=35?'green':'red'}">${p>=35?'✅ PASS':'❌ FAIL'}</strong></div></div>
    </div>
    <table class="print-table">
      <thead><tr><th>#</th><th>SUBJECT</th><th>MARKS OBTAINED</th><th>MAX MARKS</th><th>%</th><th>GRADE</th></tr></thead>
      <tbody>
        ${s.marks.map((m,i)=>{
          const mp=Math.round((m.score/m.maxScore)*100);
          return `<tr>
            <td>${i+1}</td><td>${m.subject}</td>
            <td><strong>${m.score}</strong></td><td>${m.maxScore}</td>
            <td>${mp}%</td>
            <td><strong>${gradeLabel(mp)}</strong></td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    <div class="print-summary">
      <div class="ps-item"><div class="ps-val">${total(s.marks)}/${maxTotal(s.marks)}</div><div class="ps-label">TOTAL MARKS</div></div>
      <div class="ps-item"><div class="ps-val">${p}%</div><div class="ps-label">PERCENTAGE</div></div>
      <div class="ps-item"><div class="ps-val">${g}</div><div class="ps-label">OVERALL GRADE</div></div>
      <div class="ps-item"><div class="ps-val">${s.marks.length}</div><div class="ps-label">SUBJECTS</div></div>
    </div>
    <div style="background:#f0fff4;border:1px solid #86efac;padding:12px;border-radius:6px;margin-bottom:16px;font-size:13px;color:#166534">
      <strong>Grade Scale:</strong> S (≥90%) • A (75–89%) • B (60–74%) • C (35–59%) • F (&lt;35%)
    </div>
    <div class="print-sign">
      <div class="sign-box">CLASS TEACHER</div>
      <div class="sign-box">PRINCIPAL</div>
      <div class="sign-box">PARENT / GUARDIAN</div>
    </div>
    <div class="print-footer">This is a computer-generated marksheet. | EduTrack Pro v2.0 | Generated: ${today}</div>
  </div>`;
}

function doPrint(sid){
  const s=students.find(x=>x.id===sid);
  const pa=document.getElementById('printArea');
  pa.style.display='block';
  pa.innerHTML=buildPrintHTML(s,false);
  window.print();
  setTimeout(()=>{pa.style.display='none';pa.innerHTML='';},1000);
}

function doDownload(sid){
  const s=students.find(x=>x.id===sid);
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"/><title>Marksheet-${s.name}</title>
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    body{font-family:'Rajdhani',sans-serif;background:#f8fafc;display:flex;justify-content:center;padding:40px;}
    .print-preview{background:white;color:#1a1a2e;border-radius:12px;padding:40px;max-width:680px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,0.1);}
    .print-header{text-align:center;border-bottom:3px double #1a1a2e;padding-bottom:16px;margin-bottom:20px;}
    .print-school{font-size:22px;font-weight:700;color:#1a1a2e;letter-spacing:2px;}
    .print-subtitle{font-size:13px;color:#555;margin-top:4px;letter-spacing:1px;}
    .print-badge{display:inline-block;background:#1a1a2e;color:white;padding:4px 16px;border-radius:20px;font-size:12px;margin-top:8px;}
    .print-info{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:20px;background:#f8fafc;padding:14px;border-radius:8px;}
    .pi-item{font-size:13px;}.pi-label{color:#888;font-size:11px;letter-spacing:1px;}
    .print-table{width:100%;border-collapse:collapse;margin-bottom:20px;}
    .print-table th{background:#1a1a2e;color:white;padding:10px 14px;text-align:left;font-size:12px;letter-spacing:1px;}
    .print-table td{padding:10px 14px;border-bottom:1px solid #e2e8f0;font-size:14px;}
    .print-table tr:nth-child(even) td{background:#f8fafc;}
    .print-summary{display:flex;justify-content:space-around;background:#1a1a2e;color:white;padding:16px;border-radius:8px;margin-bottom:16px;}
    .ps-item{text-align:center;}.ps-val{font-size:22px;font-weight:700;}.ps-label{font-size:10px;opacity:.7;letter-spacing:1px;}
    .print-sign{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:24px;}
    .sign-box{text-align:center;padding-top:40px;border-top:1px solid #ccc;font-size:12px;color:#555;letter-spacing:1px;}
    .print-footer{text-align:center;font-size:11px;color:#aaa;margin-top:16px;border-top:1px solid #e2e8f0;padding-top:12px;}
  </style></head><body>${buildPrintHTML(s,false)}</body></html>`;
  const blob=new Blob([html],{type:'text/html'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`Marksheet_${s.name.replace(/ /g,'_')}.html`;
  a.click();
  toast('Downloaded! ⬇️ Open in browser to print as PDF');
}
